services:
  - type: web
    name: ai-news-backend
    env: python
    plan: free
    region: ohio
    buildCommand: "pip install -r backend/requirements.txt && python -m spacy download en_core_web_sm"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
